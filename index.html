async function unlock(){
  var pw=document.getElementById("pw").value;
  if(!pw){document.getElementById("err").textContent="Please enter the access code";return;}
  document.getElementById("err").textContent="";
  document.getElementById("spinner").style.display="block";
  try{
    var raw=Uint8Array.from(atob(BLOB),function(c){return c.charCodeAt(0);});
    var salt=raw.slice(0,16);
    var nonce=raw.slice(16,28);
    var tag=raw.slice(28,44);
    var ct=raw.slice(44);
    var combined=new Uint8Array(ct.length+16);
    combined.set(ct);
    combined.set(tag,ct.length);
    var enc=new TextEncoder();
    var keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    var decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},key,combined);
    var html=new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.getElementById("spinner").style.display="none";
    document.getElementById("err").textContent="Incorrect access code";
    document.getElementById("pw").value="";
    document.getElementById("pw").focus();
  }
}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock();});
</script>
