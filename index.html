{cat:"Raw materials",nm:"Aluminum 6061/7005",rows:[["Annual","~45 tons"],["Cost","$3.80\u20134.50/kg"],["Stock","12t ($48K)"],["Lead","6\u20138 wks"]]},
{cat:"Drivetrain",nm:"Shimano/SRAM sets",rows:[["SKUs","24 (6 tiers)"],["Annual","10K sets"],["Cost","$180\u2013620/set"],["Stock","2,500 ($680K)"]]},
{cat:"Motors",nm:"Bafang/Shimano STEPS",rows:[["SKUs","4 models"],["Annual","6,000"],["Cost","$165\u2013310"],["Stock","1,500 ($340K)"]]},
{cat:"Batteries",nm:"Li-ion 36V/48V",rows:[["SKUs","3 (400\u2013700Wh)"],["Annual","6,000"],["Cost","$185\u2013290"],["Stock","1,500 ($360K)"]]},
{cat:"Wheels",nm:"Rims, hubs, spokes, tires",rows:[["SKUs","140+ combos"],["Annual","10K pairs"],["Cost","$85\u2013240/pr"],["Stock","2,500 ($310K)"]]},
{cat:"Brakes",nm:"Hydraulic disc sets",rows:[["SKUs","8 models"],["Annual","10K sets"],["Cost","$45\u2013185"],["Stock","2,500 ($180K)"]]},
{cat:"Small parts",nm:"Cables, bolts, BBs",rows:[["SKUs","1,200+"],["Annual","$420K"],["Per bike","$42"],["Stock","$105K"]]},
{cat:"Paint",nm:"Primer, base, clear",rows:[["SKUs","85"],["Annual","$280K"],["Per frame","$28"],["Stock","$70K"]]}
];

var state={tab:"process",dom:0};
function h(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function dots(v){return Array.from({length:5},function(_,i){var c=i<v?"on":"";if(c&&v>=5)c="on ex";else if(c&&v>=4)c="on hi";return '<span class="'+c+'"></span>';}).join("");}
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var totalSteps=DATA.reduce(function(s,x){return s+x.steps.length;},0);

  // Brand
  app.innerHTML+='<div class="brand"><div class="brand-left"><div class="brand-icon">L</div><div class="brand-info"><span class="brand-name">Lattice Cycles</span><span class="brand-sub">a Euphree group company</span></div></div><span class="brand-tag mn">$30M seed \u00B7 AI-powered manufacturing</span></div>';

  // Hero
  app.innerHTML+='<div class="hero"><div class="hero-ey mn">Seed round manufacturing plan</div><div class="hero-t">10,000 bikes/year,<br><span>powered by AI agents</span></div><div class="hero-s">8 domains, '+totalSteps+' steps, 50+ AI agents helping people and robots build premium bikes. From raw aluminum to boxed bike in 18 months.</div></div>';

  // Stats
  var stats=[["$30M","Seed",C.ac],["10K","Bikes/yr",C.bl],["42","Team",C.pu],["50+","Agents",C.co],["18mo","To prod",C.am]];
  var sr='<div class="mrow">';stats.forEach(function(s){sr+='<div class="mc"><div class="mc-v" style="color:'+s[2]+'">'+s[0]+'</div><div class="mc-l mn">'+s[1]+'</div></div>';});sr+='</div>';
  app.innerHTML+=sr;

  // Tabs
  var tabs=[["process","I. Process"],["cost","II. Costs"],["inventory","III. Inventory"],["timeline","IV. Timeline"],["org","V. Team"]];
  var tr='<div class="tabs">';tabs.forEach(function(t){tr+='<button class="tab'+(state.tab===t[0]?" on":"")+'" data-tab="'+t[0]+'">'+t[1]+'</button>';});tr+='</div>';
  app.innerHTML+=tr;

  // Panels
  app.innerHTML+='<div id="p-process" class="panel'+(state.tab==="process"?" on":"")+'"></div>';
  app.innerHTML+='<div id="p-cost" class="panel'+(state.tab==="cost"?" on":"")+'"></div>';
  app.innerHTML+='<div id="p-inventory" class="panel'+(state.tab==="inventory"?" on":"")+'"></div>';
  app.innerHTML+='<div id="p-timeline" class="panel'+(state.tab==="timeline"?" on":"")+'"></div>';
  app.innerHTML+='<div id="p-org" class="panel'+(state.tab==="org"?" on":"")+'"></div>';

  // Tab clicks
  app.querySelectorAll(".tab").forEach(function(btn){btn.addEventListener("click",function(){state.tab=this.dataset.tab;render();});});

  if(state.tab==="process") renderProcess();
  if(state.tab==="cost") renderCost();
  if(state.tab==="inventory") renderInventory();
  if(state.tab==="timeline") renderTimeline();
  if(state.tab==="org") renderOrg();
}

function renderProcess(){
  var el=document.getElementById("p-process");
  var d=DATA[state.dom];
  // Domain grid
  var g='<div class="dgrid">';
  DATA.forEach(function(dd,i){g+='<div class="dc'+(i===state.dom?" on":"")+'" data-dom="'+i+'"><div class="dc-i">'+dd.icon+'</div><div class="dc-n">'+dd.nm+'</div><div class="dc-c mn">'+dd.steps.length+' steps \u00B7 '+dd.gain+'</div></div>';});
  g+='</div>';
  // Phase header
  g+='<div class="ph"><div class="ph-n mn">Domain '+(state.dom+1)+'/'+DATA.length+'</div><div class="ph-t">'+d.icon+' '+d.nm+'</div><div class="ph-d">'+d.desc+'</div></div>';
  // Steps
  g+='<div class="fl">';
  d.steps.forEach(function(st,i){
    var cn=st.cn?'<div class="stp-cn mn">'+st.cn+'</div>':"";
    var tgs=st.tg.map(function(t){return '<span class="tg" style="background:'+TAGS[t].bg+';color:'+TAGS[t].c+'">'+TAGS[t].l+'</span>';}).join("");
    g+='<div class="stp" data-step="'+i+'"><div class="stp-h"><div class="stp-idx mn" style="background:'+d.cl+'20;color:'+d.cl+'">'+String(i+1).padStart(2,"0")+'</div><div class="stp-inf"><div class="stp-nm">'+st.nm+'</div>'+cn+'</div><div class="stp-imp"><span class="stp-il mn">'+IL[st.im]+'</span><div class="dots">'+dots(st.im)+'</div></div><span class="stp-ch">\u25B6</span></div><div class="stp-b"><div class="stp-cols"><div><div class="stp-cl cur mn">Current</div><div class="stp-ct">'+st.p+'</div></div><div><div class="stp-cl ai mn">\u26A1 AI agent</div><div class="stp-ct">'+st.a+'</div></div></div><div class="tgs">'+tgs+'</div></div></div>';
  });
  g+='</div>';
  el.innerHTML=g;
  el.querySelectorAll(".dc").forEach(function(c){c.addEventListener("click",function(){state.dom=+this.dataset.dom;render();});});
  el.querySelectorAll(".stp").forEach(function(s){s.addEventListener("click",function(){this.classList.toggle("open");});});
}

function renderCost(){
  var el=document.getElementById("p-cost");
  var o='<div class="sl mn">Section II</div><div class="h2">$30M seed allocation</div><div class="desc">18-month runway. 10K bikes/year from 40K sqft.</div>';
  o+='<div class="mrow"><div class="mc"><div class="mc-v" style="color:'+C.ac+'">$30M</div><div class="mc-l mn">Seed</div></div><div class="mc"><div class="mc-v" style="color:'+C.bl+'">$28\u201335M</div><div class="mc-l mn">Yr 2 rev</div></div><div class="mc"><div class="mc-v" style="color:'+C.am+'">42\u201348%</div><div class="mc-l mn">Margin</div></div></div>';
  o+='<div style="margin-bottom:24px">';
  ALLOC.forEach(function(a){o+='<div class="bar-r"><div class="bar-l">'+a.l+'</div><div class="bar-tk"><div class="bar-f" style="width:'+Math.round(a.v/8.5*100)+'%;background:'+a.c+'">$'+a.v+'M</div></div></div>';});
  o+='</div>';
  o+='<div style="border-top:1px solid rgba(255,255,255,.14);padding-top:20px;margin-bottom:8px"><div style="font-size:16px;font-weight:700;margin-bottom:4px">Per-bike unit economics</div><div style="font-size:11px;color:'+C.tx2+';margin-bottom:12px">AI cuts labor \u221255%, scrap \u221240% vs. conventional.</div></div>';
  o+='<div style="overflow-x:auto"><table class="ct"><thead><tr><th class="mn">Component</th><th class="mn">Conv.</th><th class="mn">Lattice</th><th class="mn">\u0394</th></tr></thead><tbody>';
  UNIT.forEach(function(r){var pct=Math.round((r.l-r.c)/r.c*100);o+='<tr><td>'+r.i+'</td><td style="color:'+C.tx3+'">$'+r.c+'</td><td style="font-weight:600">$'+r.l+'</td><td class="'+(pct<=0?"green":"red")+'">'+(pct>0?"+":"")+pct+'%</td></tr>';});
  o+='</tbody><tfoot><tr><td style="font-weight:700">Total (e-bike)</td><td style="color:'+C.tx3+'">$2,025</td><td class="green" style="font-weight:700">$1,625</td><td class="green" style="font-weight:700">\u221220%</td></tr></tfoot></table></div>';
  el.innerHTML=o;
}

function renderInventory(){
  var el=document.getElementById("p-inventory");
  var o='<div class="sl mn">Section III</div><div class="h2">Inventory & parts plan</div><div class="desc">BOM for 10K bikes/year (60% e-bike). Initial stock = first 2,500 units.</div>';
  o+='<div class="mrow"><div class="mc"><div class="mc-v" style="color:'+C.ac+'">1,850+</div><div class="mc-l mn">SKUs</div></div><div class="mc"><div class="mc-v" style="color:'+C.bl+'">$2.8M</div><div class="mc-l mn">Initial stock</div></div><div class="mc"><div class="mc-v" style="color:'+C.am+'">$9.2M</div><div class="mc-l mn">Annual spend</div></div></div>';
  o+='<div class="inv-grid">';

function renderTimeline(){
  var el=document.getElementById("p-timeline");
  function tlp(phase,range,title,desc,items,metrics,bc,bg){
    var o='<div class="tlp"><div class="tlp-hd"><span class="tlp-bg mn" style="background:'+bg+';color:'+bc+'">'+phase+'</span><span class="tlp-rg mn">'+range+'</span></div><div class="tlp-t">'+title+'</div><div class="tlp-d">'+desc+'</div><div class="tlp-it">';
    items.forEach(function(it){o+='<div class="tli"><span class="tli-d" style="background:'+it[1]+'"></span>'+it[0]+'</div>';});
    o+='</div><div class="tlp-ms">';
    metrics.forEach(function(m){o+='<div><div class="tlm-v" style="color:'+m[1]+'">'+m[0]+'</div><div class="tlm-l mn">'+m[2]+'</div></div>';});
    o+='</div></div>';return o;
  }
  var o='<div class="sl mn">Section IV</div><div class="h2">18-month launch</div><div class="desc">Lease signed \u2192 10K/year. First bikes ship month 12.</div>';

  o+='<div class="tlc"></div>';
  o+=tlp("Phase 3","Mo 13\u201318","Ramp to 10K/year","200 bikes/week sustained. Cross-domain feedback loops. Target unit economics achieved.",[["Hydroform twin live",C.bl],["Auto derailleur + wheel true",C.co],["Vacuum brake bleed at scale",C.co],["Digital birth cert/bike",C.pk],["Supply risk graph",C.li],["200/week sustained",C.am]],[["$30M",C.ac,"Deployed"],["3,000+",C.bl,"Shipped"],["42",C.am,"Full team"],["50+",C.co,"Agents"]],C.pu,"rgba(167,139,250,.12)");
  el.innerHTML=o;
}

function renderOrg(){

    if(people)o+='<div class="mn" style="font-size:10px;color:'+C.tx3+';margin-bottom:4px">'+people+'</div>';
    o+='<div style="font-size:11px;color:'+C.tx2+';line-height:1.5;margin-bottom:8px">'+desc+'</div>';
    o+='<div style="display:flex;flex-wrap:wrap;gap:3px">';tags.forEach(function(t){o+='<span style="padding:2px 6px;border-radius:100px;font-size:9px;background:'+C.bg4+';color:'+C.tx3+'">'+t+'</span>';});
    o+='</div></div>';return o;

  var o='<div class="sl mn">Section V</div><div class="h2">42-person team</div><div class="desc">AI engineers + production + ops. Scales to 25K at Series A with +8 production only.</div>';

  o+='</div></div>';
  o+='<div class="mrow"><div class="mc"><div class="mc-v" style="color:'+C.ac+'">42</div><div class="mc-l mn">Total team</div></div><div class="mc"><div class="mc-v" style="color:'+C.bl+'">16</div><div class="mc-l mn">AI/eng</div></div><div class="mc"><div class="mc-v" style="color:'+C.co+'">18</div><div class="mc-l mn">Production</div></div><div class="mc"><div class="mc-v" style="color:'+C.ac+'">7+1</div><div class="mc-l mn">Ops+CEO</div></div></div>';
  o+='<div class="fnote"><p>Payroll: ~$5.8M/yr ($138K avg loaded). Scales to 25K/yr at Series A with +8 production staff, no AI team growth.</p></div>';

render();
